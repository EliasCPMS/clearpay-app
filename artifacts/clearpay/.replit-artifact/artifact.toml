kind = "web"
previewPath = "/"
title = "ClearPay Sales System"
version = "1.0.0"
id = "artifacts/clearpay"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21083

[services.development]
run = "pnpm --filter @workspace/clearpay run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/clearpay", "run", "build" ]
publicDir = "artifacts/clearpay/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21083"
BASE_PATH = "/"
